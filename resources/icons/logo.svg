<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Infinity path -->
  <path d="M 120 100 C 50 20, 20 180, 120 100 C 220 20, 280 20, 280 100 C 280 180, 220 180, 120 100" 
        fill="none" stroke="url(#grad1)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        
  <!-- Main node -->
  <circle cx="120" cy="100" r="16" fill="#1E1E1E" stroke="#4facfe" stroke-width="6"/>
  
  <!-- Right node -->
  <circle cx="280" cy="100" r="16" fill="#1E1E1E" stroke="#00f2fe" stroke-width="6"/>
  
  <!-- Top node (branch) -->
  <circle cx="200" cy="60" r="12" fill="#1E1E1E" stroke="#4facfe" stroke-width="6"/>
  <path d="M 120 100 Q 160 60, 200 60" fill="none" stroke="#4facfe" stroke-width="6" stroke-linecap="round"/>
</svg>
