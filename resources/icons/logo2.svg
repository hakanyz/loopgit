<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="branchGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF512F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F09819;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1FA2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12D8FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Branch Line -->
  <path d="M 60 140 L 340 140" fill="none" stroke="url(#mainGrad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Feature Branch Line -->
  <path d="M 140 140 C 180 140, 180 60, 220 60 L 320 60" fill="none" stroke="url(#branchGrad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Main Branch Nodes -->
  <circle cx="100" cy="140" r="18" fill="#1E1E1E" stroke="url(#mainGrad)" stroke-width="6"/>
  <circle cx="260" cy="140" r="18" fill="#1E1E1E" stroke="url(#mainGrad)" stroke-width="6"/>
  <circle cx="340" cy="140" r="18" fill="#1E1E1E" stroke="url(#mainGrad)" stroke-width="6"/>
  
  <!-- Feature Branch Node -->
  <circle cx="220" cy="60" r="18" fill="#1E1E1E" stroke="url(#branchGrad)" stroke-width="6"/>
  <circle cx="320" cy="60" r="18" fill="#1E1E1E" stroke="url(#branchGrad)" stroke-width="6"/>
  
  <!-- Loop/Sync Arrow -->
  <path d="M 270 90 A 40 40 0 0 1 290 110" fill="none" stroke="#A8FF78" stroke-width="6" stroke-linecap="round"/>
  <polygon points="290,110 280,100 300,100" fill="#A8FF78" />

</svg>
